site_name: Uni Guide
site_url: http://127.0.0.1:8000/

extra:
  generator: false

theme:
  name: material
  favicon: assets/images/favicon.png
  icon:
    logo: material/book
    alternate: material/earth
  palette:
    - scheme: default
      primary: blue
      accent: pink
    - scheme: slate
      primary: blue
      accent: pink
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.progress
    - navigation.tracking
    - navigation.tabs.sticky
    - navigation.sections

plugins:
  - search
  - i18n:
      docs_structure: suffix
      languages:
        - locale: en
          default: true
          name: English
          build: true
        - locale: fr
          name: Français
          build: true
          nav_translations:
            General Info: Informations générales
            Undergraduate: Premier cycle
            Graduate: Études supérieures
            English Tests: Tests d'anglais
            College Readiness Programs: Programmes de préparation au collège
            Other Opportunities: Autres opportunités
            US Student Visa: Visa d'étudiant américain
            Canada Study Permit: Permis d'études canadien
            Various Scholarships: Diverses bourses
            Other Immigration Programs: Autres programmes d'immigration
            Study in France: Étudier en France
            Special fields: Domaines spécialisés
            Contact: Contact

markdown_extensions:
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

nav:
  - General Info: index.md
  - Undergraduate: undergrad.md
  - Graduate: grad.md
  - English Tests: english-tests.md
  - College Readiness Programs: college-readiness-programs.md
  - Other Opportunities:
      - US Student Visa: others/usa-student-visa.md
      - Canada Study Permit: others/canada-study-permit.md
      - Various Scholarships: others/various-scholarships.md
      - Other Immigration Programs: others/other-immigration-programs.md
      - Study in France: others/france.md
      - Special fields: others/special-fields.md
  - Amakuru mu Kirundi: mu-kirundi.md
  - Contact: contact.md